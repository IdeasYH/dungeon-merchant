spring:
  datasource:
    url: jdbc:h2:mem:dungeon_merchant;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: postgres
    password: postgres
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: test-secret-key-that-is-at-least-32-bytes-long
  expiration: 600000
  refresh-expiration: 3600000
