spring:
  application:
    name: dungeon-merchant
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dungeon_merchant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:replace-this-with-a-secure-32-byte-secret}
  expiration: 86400000
  refresh-expiration: 604800000
